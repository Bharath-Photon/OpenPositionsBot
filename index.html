function formatResponse(text){
  text=text.replace(/\*\*/g,"");
  const lines=text.split("\n"),elements=[];
  let key=0,i=0;
  while(i<lines.length){
    const line=lines[i];
    if(line.trim().startsWith("|")&&line.trim().endsWith("|")){
      const tl=[];
      while(i<lines.length&&lines[i].trim().startsWith("|")){if(!lines[i].includes("---"))tl.push(lines[i]);i++;}
      if(tl.length>0){
        const headers=tl[0].trim().slice(1,-1).split("|").map(h=>h.trim());
        elements.push(React.createElement("div",{key:key++,style:{overflowX:"auto",margin:"8px 0"}},
          React.createElement("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:13}},
            React.createElement("thead",null,React.createElement("tr",null,headers.map((h,j)=>React.createElement("th",{key:j,style:{textAlign:"left",padding:"6px 10px",background:"rgba(236,187,105,0.12)",color:GOLD,fontSize:11,textTransform:"uppercase",letterSpacing:"0.05em",borderBottom:"1px solid "+BORDER}},h)))),
            React.createElement("tbody",null,tl.slice(1).map((row,ri)=>{const cells=row.trim().slice(1,-1).split("|").map(c=>c.trim());return React.createElement("tr",{key:ri},cells.map((c,ci)=>React.createElement("td",{key:ci,style:{padding:"6px 10px",borderBottom:"1px solid rgba(255,255,255,0.05)",color:CREAM}},c)));}))
          )
        ));
      }
      continue;
    }
    if(line.trim().startsWith("- ")||line.trim().startsWith("• "))
      elements.push(React.createElement("li",{key:key++,style:{marginLeft:16,marginBottom:3,color:CREAM,fontSize:14}},line.replace(/^[-\u2022]\s+/,"")));
    else if(line.trim()==="")elements.push(React.createElement("div",{key:key++,style:{height:6}}));
    else elements.push(React.createElement("p",{key:key++,style:{margin:"2px 0",lineHeight:1.6,color:CREAM,fontSize:14}},line));
    i++;
  }
  return elements;
}
